[pytest]
# The default suite skips the minutes-long tests (coupled-Dyson loop dressing,
# k>=3 spatial loops) so a bare `sage -python -m pytest` finishes in ~budget and
# stays green.  Run the heavy ones on demand with:  pytest -m slow
testpaths = tests
markers =
    slow: long-running tests (coupled-Dyson loops, k>=3 spatial); deselected by default
addopts = -m "not slow"
