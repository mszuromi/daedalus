# Conda environment for Daedalus — the MSRJD Field Theory Framework.
#
#   conda env create -f environment.yml      # or:  mamba env create -f environment.yml
#   conda activate daedalus
#
# SageMath brings Python 3.13 and most of the stack (numpy, scipy, sympy, matplotlib,
# networkx, cysignals, the Jupyter stack incl. ipywidgets, and a SageMath kernel).
# The remaining lines are the only extras Daedalus adds on top.
name: daedalus
channels:
  - conda-forge
dependencies:
  - sage=10.8
  # Pin the scientific stack to the versions the suite is tested against.  Left unpinned,
  # conda-forge resolves the bleeding edge (numpy 2.4 / scipy 1.18 / sympy 1.14 / py3.14),
  # which removed np.trapz, made float(size-1 array) a hard error, and shifts the symbolic
  # mean-field solve onto spurious saddles — 105 CI failures (see git history).  The bounds
  # below keep the env on the tested stack (numpy 2.3.x, scipy 1.15-1.17, sympy 1.13.x, py3.13).
  - python <3.14
  - numpy <2.4
  - scipy <1.18
  - sympy <1.14
  - numba>=0.61,<0.66    # loop-integrator speed; required by the sim cells in notebooks/examples/
  - pydot>=4,<5          # optional: diagram / prediagram plots
  - graphviz             # optional: renders pydot output
  - pytest               # test runner (used by the CI workflow)
  # - pyperclip          # optional: clipboard buttons in the graphical model builder
